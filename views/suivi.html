<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Suivi des réclamations - Système de gestion des réclamations clients">
    <title>SGR - Suivi des réclamations</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <!-- ======================== -->
    <!-- Navigation -->
    <!-- ======================== -->
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
            <a class="navbar-brand-custom" href="/dashboard">
                <i class="bi bi-shield-check"></i>
                SGR
            </a>

            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <i class="bi bi-list text-light fs-4"></i>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto ms-4">
                    <li class="nav-item">
                        <a class="nav-link-custom" href="/dashboard">
                            <i class="bi bi-grid-1x2 me-1"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item" data-role="client">
                        <a class="nav-link-custom" href="/reclamation">
                            <i class="bi bi-plus-circle me-1"></i>Nouvelle réclamation
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link-custom active" href="/suivi">
                            <i class="bi bi-chat-square-text me-1"></i>Suivi
                        </a>
                    </li>
                </ul>

                <div class="d-flex align-items-center gap-3">
                    <div class="user-info">
                        <div class="user-avatar" id="user-avatar">U</div>
                        <div class="user-details">
                            <div class="name" id="user-name">Utilisateur</div>
                            <div class="role" id="user-role">Client</div>
                        </div>
                    </div>
                    <button class="btn-logout" onclick="logout()" title="Se déconnecter">
                        <i class="bi bi-box-arrow-right"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- ======================== -->
    <!-- Contenu Principal -->
    <!-- ======================== -->
    <main class="main-content">
        <div class="container">
            <!-- En-tête -->
            <div class="page-header fade-in">
                <h1 class="page-title">
                    <i class="bi bi-chat-square-text me-2"></i>Suivi des réclamations
                </h1>
                <p class="page-subtitle">Consultez vos réclamations et les réponses associées</p>
            </div>

            <!-- Liste des réclamations avec réponses -->
            <div id="suivi-list">
                <div class="text-center py-4">
                    <span class="spinner-border spinner-border-sm text-primary-custom"></span>
                    <span class="ms-2 text-muted">Chargement des réclamations...</span>
                </div>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/suivi.js"></script>
</body>
</html>
