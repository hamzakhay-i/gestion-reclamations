<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Tableau de bord - Système de gestion des réclamations clients">
    <title>SGR - Tableau de bord</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <!-- ======================== -->
    <!-- Navigation -->
    <!-- ======================== -->
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
            <a class="navbar-brand-custom" href="/dashboard">
                <i class="bi bi-shield-check"></i>
                SGR
            </a>

            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <i class="bi bi-list text-light fs-4"></i>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto ms-4">
                    <li class="nav-item">
                        <a class="nav-link-custom active" href="/dashboard">
                            <i class="bi bi-grid-1x2 me-1"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item" data-role="client">
                        <a class="nav-link-custom" href="/reclamation">
                            <i class="bi bi-plus-circle me-1"></i>Nouvelle réclamation
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link-custom" href="/suivi">
                            <i class="bi bi-chat-square-text me-1"></i>Suivi
                        </a>
                    </li>
                </ul>

                <div class="d-flex align-items-center gap-3">
                    <div class="user-info">
                        <div class="user-avatar" id="user-avatar">U</div>
                        <div class="user-details">
                            <div class="name" id="user-name">Utilisateur</div>
                            <div class="role" id="user-role">Client</div>
                        </div>
                    </div>
                    <button class="btn-logout" onclick="logout()" title="Se déconnecter">
                        <i class="bi bi-box-arrow-right"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- ======================== -->
    <!-- Contenu Principal -->
    <!-- ======================== -->
    <main class="main-content">
        <div class="container">
            <!-- En-tête de page -->
            <div class="page-header fade-in">
                <h1 class="page-title">
                    <i class="bi bi-grid-1x2 me-2"></i>Tableau de bord
                </h1>
                <p class="page-subtitle">Vue d'ensemble des réclamations</p>
            </div>

            <!-- ======================== -->
            <!-- Statistiques (Admin/Agent) -->
            <!-- ======================== -->
            <div data-role="admin,agent">
                <div class="stats-grid">
                    <div class="stat-card total">
                        <div class="stat-icon">
                            <i class="bi bi-collection"></i>
                        </div>
                        <div class="stat-value" id="stats-total">0</div>
                        <div class="stat-label">Total réclamations</div>
                    </div>

                    <div class="stat-card ouvertes">
                        <div class="stat-icon">
                            <i class="bi bi-circle-fill"></i>
                        </div>
                        <div class="stat-value" id="stats-ouvertes">0</div>
                        <div class="stat-label">Ouvertes</div>
                    </div>

                    <div class="stat-card en-cours">
                        <div class="stat-icon">
                            <i class="bi bi-arrow-repeat"></i>
                        </div>
                        <div class="stat-value" id="stats-en-cours">0</div>
                        <div class="stat-label">En cours</div>
                    </div>

                    <div class="stat-card traitees">
                        <div class="stat-icon">
                            <i class="bi bi-check-circle-fill"></i>
                        </div>
                        <div class="stat-value" id="stats-traitees">0</div>
                        <div class="stat-label">Traitées</div>
                    </div>
                </div>
            </div>

            <!-- ======================== -->
            <!-- Liste des réclamations -->
            <!-- ======================== -->
            <div class="glass-card fade-in" style="animation-delay: 0.2s;">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="mb-0" style="font-weight: 700;">
                        <i class="bi bi-list-ul me-2"></i>Réclamations
                    </h5>
                    <a href="/reclamation" class="btn btn-primary-custom btn-sm" data-role="client">
                        <i class="bi bi-plus-lg me-1"></i>Nouvelle
                    </a>
                </div>

                <div id="reclamations-list">
                    <div class="text-center py-4">
                        <span class="spinner-border spinner-border-sm text-primary-custom"></span>
                        <span class="ms-2 text-muted">Chargement...</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/dashboard.js"></script>
</body>
</html>
