<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Système de gestion des réclamations clients - Connexion">
    <title>SGR - Connexion</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="login-page">
        <!-- ======================== -->
        <!-- Formulaire de Connexion -->
        <!-- ======================== -->
        <div class="login-container">
            <div class="login-card fade-in" id="login-card">
                <div class="login-logo">
                    <i class="bi bi-shield-check"></i>
                    <h2>SGR</h2>
                    <p>Système de Gestion des Réclamations</p>
                </div>

                <form id="login-form">
                    <div class="mb-3">
                        <label for="login-email" class="form-label">
                            <i class="bi bi-envelope me-1"></i>Adresse email
                        </label>
                        <input type="email" class="form-control" id="login-email" 
                            placeholder="votre@email.com" required>
                    </div>

                    <div class="mb-4">
                        <label for="login-password" class="form-label">
                            <i class="bi bi-lock me-1"></i>Mot de passe
                        </label>
                        <input type="password" class="form-control" id="login-password" 
                            placeholder="Entrez votre mot de passe" required>
                    </div>

                    <button type="submit" class="btn btn-primary-custom w-100 py-2">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Se connecter
                    </button>
                </form>

                <div class="login-divider">
                    <span>ou</span>
                </div>

                <p class="text-center mb-0" style="font-size: 0.9rem;">
                    <span style="color: var(--text-muted);">Pas encore de compte ?</span>
                    <a href="#" id="show-register" class="text-primary-custom text-decoration-none fw-600">
                        Créer un compte
                    </a>
                </p>
            </div>

            <!-- ======================== -->
            <!-- Formulaire d'Inscription -->
            <!-- ======================== -->
            <div class="login-card hidden" id="register-card">
                <div class="login-logo">
                    <i class="bi bi-person-plus-fill"></i>
                    <h2>Inscription</h2>
                    <p>Créer un nouveau compte</p>
                </div>

                <form id="register-form">
                    <div class="mb-3">
                        <label for="register-name" class="form-label">
                            <i class="bi bi-person me-1"></i>Nom complet
                        </label>
                        <input type="text" class="form-control" id="register-name" 
                            placeholder="Votre nom complet" required>
                    </div>

                    <div class="mb-3">
                        <label for="register-email" class="form-label">
                            <i class="bi bi-envelope me-1"></i>Adresse email
                        </label>
                        <input type="email" class="form-control" id="register-email" 
                            placeholder="votre@email.com" required>
                    </div>

                    <div class="mb-3">
                        <label for="register-password" class="form-label">
                            <i class="bi bi-lock me-1"></i>Mot de passe
                        </label>
                        <input type="password" class="form-control" id="register-password" 
                            placeholder="Minimum 6 caractères" required minlength="6">
                    </div>

                    <div class="mb-3">
                        <label for="register-confirm-password" class="form-label">
                            <i class="bi bi-lock-fill me-1"></i>Confirmer le mot de passe
                        </label>
                        <input type="password" class="form-control" id="register-confirm-password" 
                            placeholder="Retapez votre mot de passe" required minlength="6">
                    </div>

                    <div class="mb-4">
                        <label for="register-role" class="form-label">
                            <i class="bi bi-people me-1"></i>Rôle
                        </label>
                        <select class="form-select" id="register-role">
                            <option value="client">Client</option>
                            <option value="agent">Agent</option>
                            <option value="admin">Administrateur</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary-custom w-100 py-2">
                        <i class="bi bi-person-plus-fill me-2"></i>S'inscrire
                    </button>
                </form>

                <div class="login-divider">
                    <span>ou</span>
                </div>

                <p class="text-center mb-0" style="font-size: 0.9rem;">
                    <span style="color: var(--text-muted);">Déjà un compte ?</span>
                    <a href="#" id="show-login" class="text-primary-custom text-decoration-none fw-600">
                        Se connecter
                    </a>
                </p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
